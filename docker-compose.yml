# docker-compose.yml — Cuentitas Bot (agente + Postgres) para el VPS
#
# OpenWA corre por SEPARADO (su propio repo/compose), y puede ser el MISMO OpenWA
# que ya usa Rimainder: soporta varias sesiones (una por número). Acá levantamos SOLO
# el bot + su Postgres (historial de chat), y lo unimos a la red de OpenWA para que:
#   - el bot le hable a OpenWA:          http://openwa-api:2785
#   - OpenWA le pegue el webhook al bot: http://cuentitas-bot:8000/webhook
#
# Los servicios se llaman "cuentitas-bot*" (NO "agent") para no chocar con Rimainder,
# que también se une a la red openwa-network con un servicio "agent".
#
# El bot le pega a la API de Cuentitas por internet (CUENTITAS_API_URL), no por
# la red Docker: ya está publicada en https://cuentitas.site/api.
#
# Pasos (ver README): 1) tener OpenWA corriendo (crea la red openwa-network) y una
# sesión para el número del bot; 2) en el .env de OpenWA: WEBHOOK_SSRF_PROTECT=false.

services:
  cuentitas-bot-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cuentitasbot_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  cuentitas-bot:
    build: .
    env_file:
      - .env
    depends_on:
      - cuentitas-bot-postgres
    networks:
      - internal      # para hablar con Postgres
      - openwa         # para hablar con OpenWA y recibir su webhook
    restart: unless-stopped

networks:
  internal:
  openwa:
    external: true
    name: ${OPENWA_NETWORK:-openwa-network}

volumes:
  pgdata:
