# docker-compose.yml — Cuentitas Bot (agente + Postgres) para el VPS
#
# OpenWA corre por SEPARADO (su propio repo/compose). Acá levantamos SOLO el bot +
# su Postgres (historial de chat), y lo unimos a la red de OpenWA para que:
#   - el bot le hable a OpenWA:          http://openwa-api:2785
#   - OpenWA le pegue el webhook al bot: http://agent:8000/webhook
#
# El bot le pega a la API de Cuentitas por internet (CUENTITAS_API_URL), no por
# la red Docker: ya está publicada en https://cuentitas.site/api.
#
# Pasos (ver README): 1) levantar OpenWA primero (crea la red openwa-network);
# 2) en el .env de OpenWA poner WEBHOOK_SSRF_PROTECT=false para el webhook interno.

services:
  agent-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agent_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  agent:
    build: .
    env_file:
      - .env
    depends_on:
      - agent-postgres
    networks:
      - internal      # para hablar con Postgres
      - openwa         # para hablar con OpenWA y recibir su webhook
    restart: unless-stopped

networks:
  internal:
  openwa:
    external: true
    name: ${OPENWA_NETWORK:-openwa-network}

volumes:
  pgdata:
